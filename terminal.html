<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRILL Terminal — Launch Intelligence</title>
  <meta name="description" content="KRILL interactive terminal. Scan, score, and explain new token launches on Robinhood Chain. Type help to get started.">
  <meta name="theme-color" content="#4ade80">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://krill.live/terminal.html">
  <meta property="og:title" content="KRILL Terminal — Launch Intelligence">
  <meta property="og:description" content="Interactive launch intelligence terminal. Scan, score, explain new token launches.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://krill.live/terminal.html">
  <meta property="og:image" content="https://krill.live/assets/krill-banner.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@krillintel">
  <meta name="twitter:image" content="https://krill.live/assets/krill-banner.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="assets/krill-icon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- background grid canvas -->
  <canvas id="bg" aria-hidden="true"></canvas>
  <!-- CRT scanline overlay -->
  <div id="scanline" aria-hidden="true"></div>

  <!-- terminal -->
  <main id="term">
    <a class="term-home" href="index.html" title="Back to home" aria-label="Back to home">← krill.live</a>
    <div id="output" role="log" aria-live="polite" aria-label="Terminal output"></div>
    <div id="input-line">
      <span id="prompt">
        <span class="p-user">krill</span><span class="p-at">@</span><span class="p-host">robinhood</span><span class="p-sep">›</span>
      </span>
      <input
        id="cmd"
        type="text"
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="Command input"
        placeholder="type help"
      >
    </div>
  </main>

  <!-- status bar -->
  <footer id="statusbar">
    <span class="sb-item" id="sb-mode">
      <span class="sb-dot"></span>
      <span id="sb-mode-text">SIGNAL</span>
    </span>
    <span class="sb-item">
      <span class="dim">chain:</span> robinhood
    </span>
    <span class="sb-item" id="sb-uptime-item">
      <span class="dim">uptime:</span> <span id="sb-uptime">—</span>
    </span>
    <span class="sb-item sb-right" id="sb-scan">last scan: —</span>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
